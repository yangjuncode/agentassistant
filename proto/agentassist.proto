syntax = "proto3";

package agentassistproto;

option go_package = "github.com/yangjuncode/agentassistant/agentassistproto";

// TextContent represents text provided to or from an LLM.
// It must have Type set to "text".
message TextContent {
  string type = 1; // Must be "text"
  string text = 2; // The text content
}

// ImageContent represents an image provided to or from an LLM.
// It must have Type set to "image".
message ImageContent {
  string type = 1;      // Must be "image"
  string data = 2;      // Base64-encoded image data
  string mime_type = 3; // MIME type of the image
}

// AudioContent represents audio data provided to or from an LLM.
// It must have Type set to "audio".
message AudioContent {
  string type = 1;      // Must be "audio"
  string data = 2;      // Base64-encoded audio data
  string mime_type = 3; // MIME type of the audio
}

// EmbeddedResource represents a resource embedded into a prompt or tool call
// result. It must have Type set to "embedded_resource".
message EmbeddedResource {
  string type = 1;      // Must be "embedded_resource"
  string uri = 2;       // URI of the embedded resource
  string mime_type = 3; // MIME type of the resource
  bytes data = 4;       // Optional: The actual resource data
}

message McpResultContent {
  // content type
  //  1: text
  //  2: image
  //  3: audio
  //  4: embedded resource
  int32 type = 1;
  // text
  TextContent text = 2;
  // image
  ImageContent image = 3;
  // audio
  AudioContent audio = 4;
  // embedded resource
  EmbeddedResource embedded_resource = 5;
}

message MsgEmpty {}

message Option {
  string label = 1;
  string description = 2;
}

message Question {
  string question = 1;         // Complete question
  string header = 2;           // Very short label
  repeated Option options = 3; // Available choices
  bool multiple = 4;           // Allow selecting multiple choices
  bool custom = 5;             // Allow typing a custom answer
}

message McpAskQuestionRequest {
  // current project directory
  string ProjectDirectory = 1;
  // ai agent's question
  string Question = 2 [ deprecated = true ];
  // timeout in seconds, default is 600s
  int32 Timeout = 3;
  // the AI agent/client name that is calling this tool (e.g., Antigravity,
  // Cascade)
  string AgentName = 4;
  // the actual LLM/inference model name being used (e.g., GPT-4, Gemini 3 Pro)
  string ReasoningModelName = 5;
  // MCP client name from initialize.clientInfo.name (e.g., windsurf)
  string McpClientName = 6;
  // ai agent's questions
  repeated Question Questions = 7;
}

message AskQuestionRequest {
  // request id
  string ID = 1;
  // user token
  string UserToken = 2;
  // ai agent's question
  McpAskQuestionRequest Request = 3;
  // timestamp (UTC)
  int64 Timestamp = 4;
}

message AskQuestionResponse {
  // request id
  string ID = 1;
  bool IsError = 2;
  map<string, string> Meta = 3;
  repeated McpResultContent contents = 4;
}

message McpWorkReportRequest {
  // current project directory
  string ProjectDirectory = 1;
  // ai agent's work report summary
  string Summary = 2;
  // timeout in seconds, default is 600s
  int32 Timeout = 3;
  // the AI agent/client name that is calling this tool (e.g., Antigravity,
  // Cascade)
  string AgentName = 4;
  // the actual LLM/inference model name being used for this task (e.g., GPT-4,
  // Gemini 3 Pro)
  string ReasoningModelName = 5;
  // MCP client name from initialize.clientInfo.name (e.g., windsurf)
  string McpClientName = 6;
}

message WorkReportRequest {
  // request id
  string ID = 1;
  // user token
  string UserToken = 2;
  // ai agent's work report summary
  McpWorkReportRequest Request = 3;
  // timestamp (UTC)
  int64 Timestamp = 4;
}

message WorkReportResponse {
  // request id
  string ID = 1;
  bool IsError = 2;
  map<string, string> Meta = 3;
  repeated McpResultContent contents = 4;
}

message McpClientInfoData {
  // MCP protocol version requested by client
  string ProtocolVersion = 1;
  // Raw JSON describing client capabilities (mcp.InitializeParams.capabilities)
  string CapabilitiesJson = 2;
  // MCP client implementation name
  string ClientName = 3;
  // MCP client implementation version
  string ClientVersion = 4;
}

message McpClientInfoRequest {
  // request id
  string ID = 1;
  // user token
  string UserToken = 2;
  // initialize request payload
  McpClientInfoData Request = 3;
  // timestamp (UTC)
  int64 Timestamp = 4;
}

message McpClientInfoResponse { bool Success = 1; }

message CheckMessageValidityRequest {
  // list of request IDs to check
  repeated string request_ids = 1;
}

message CheckMessageValidityResponse {
  // map of request ID to validity status
  map<string, bool> validity = 1;
}

// GetPendingMessagesRequest represents a request to get all pending messages
// for a user
message GetPendingMessagesRequest {
  // user token to filter messages
  string user_token = 1;
}

// PendingMessage represents a single pending message
message PendingMessage {
  // message type: "AskQuestion" or "WorkReport"
  string message_type = 1;
  // ask question request (if message_type is "AskQuestion")
  AskQuestionRequest ask_question_request = 2;
  // work report request (if message_type is "WorkReport")
  WorkReportRequest work_report_request = 3;
  // timestamp when the message was created
  int64 created_at = 4;
  // timeout in seconds
  int32 timeout = 5;
}

// GetPendingMessagesResponse represents the response containing all pending
// messages
message GetPendingMessagesResponse {
  // list of pending messages
  repeated PendingMessage pending_messages = 1;
  // total count of pending messages
  int32 total_count = 2;
}

// RequestCancelledNotification represents a notification that a request has
// been cancelled
message RequestCancelledNotification {
  // request id that was cancelled
  string request_id = 1;
  // reason for cancellation
  string reason = 2;
  // message type: "AskQuestion" or "WorkReport"
  string message_type = 3;
}

// OnlineUser represents an online user with the same token
message OnlineUser {
  // client id
  string client_id = 1;
  // user nickname
  string nickname = 2;
  // connection timestamp
  int64 connected_at = 3;
}

// GetOnlineUsersRequest represents a request to get online users with the same
// token
message GetOnlineUsersRequest {
  // user token to filter users
  string user_token = 1;
}

// GetOnlineUsersResponse represents the response containing online users
message GetOnlineUsersResponse {
  // list of online users
  repeated OnlineUser online_users = 1;
  // total count of online users
  int32 total_count = 2;
}

// ChatMessage represents a chat message between users
message ChatMessage {
  // message id
  string message_id = 1;
  // sender client id
  string sender_client_id = 2;
  // sender nickname
  string sender_nickname = 3;
  // receiver client id
  string receiver_client_id = 4;
  // receiver nickname
  string receiver_nickname = 5;
  // message content
  string content = 6;
  // timestamp when the message was sent
  int64 sent_at = 7;
  // forward target selected by sender (optional)
  ForwardTarget forward_target = 8;
}

// ForwardTarget describes how receiver should forward content to system input
message ForwardTarget {
  enum Mode {
    MODE_UNSPECIFIED = 0;
    // forward to current focused window
    FOCUSED_WINDOW = 1;
    // forward to the specific window id
    SPECIFIC_WINDOW = 2;
  }

  // forwarding mode
  Mode mode = 1;
  // target window id when mode is SPECIFIC_WINDOW
  string window_id = 2;
}

// ForwardWindowItem describes one forwardable system window
message ForwardWindowItem {
  // stable window id
  string window_id = 1;
  // display title
  string title = 2;
}

// SendChatMessageRequest represents a request to send a chat message
message SendChatMessageRequest {
  // receiver client id
  string receiver_client_id = 1;
  // message content
  string content = 2;
  // optional forward target to be used by receiver
  ForwardTarget forward_target = 3;
}

// ChatMessageNotification represents a notification of a new chat message
message ChatMessageNotification {
  // the chat message
  ChatMessage chat_message = 1;
}

// ForwardStateQueryRequest asks target client to report forward capability and windows
message ForwardStateQueryRequest {
  // request id for matching response
  string request_id = 1;
  // query target client id
  string target_client_id = 2;
  // requester client id (filled by server)
  string requester_client_id = 3;
}

// ForwardStateQueryResponse returns forward capability and window list
message ForwardStateQueryResponse {
  // request id from ForwardStateQueryRequest
  string request_id = 1;
  // response target client id (who should receive this response)
  string target_client_id = 2;
  // responder client id
  string responder_client_id = 3;
  // whether responder has enabled auto forward to system input
  bool forward_enabled = 4;
  // current forwardable windows
  repeated ForwardWindowItem windows = 5;
}

// ForwardStateChangedNotification notifies peers that sender's forward state changed
message ForwardStateChangedNotification {
  // source client id whose state changed
  string source_client_id = 1;
  // whether source has enabled auto forward
  bool forward_enabled = 2;
  // current forwardable windows snapshot
  repeated ForwardWindowItem windows = 3;
}

// ForwardDeliveryErrorNotification reports receiver could not forward to selected window
message ForwardDeliveryErrorNotification {
  // receiver of this error (usually original sender of chat message)
  string target_client_id = 1;
  // peer client id where forwarding failed
  string peer_client_id = 2;
  // invalid window id
  string invalid_window_id = 3;
  // error reason
  string reason = 4;
}

// UserLoginResponse represents the response to a user login
message UserLoginResponse {
  // client id assigned by server
  string client_id = 1;
  // success status
  bool success = 2;
  // error message if login failed
  string error_message = 3;
}

// UserConnectionStatusNotification represents a notification when a user
// connects or disconnects
message UserConnectionStatusNotification {
  // the user who connected/disconnected
  OnlineUser user = 1;
  // connection status: "connected" or "disconnected"
  string status = 2;
  // timestamp of the status change
  int64 timestamp = 3;
}

message WebsocketMessage {
  // WebsocketMessage cmd
  // AskQuestion: mcp ask_question
  // WorkReport: mcp work_report
  // AskQuestionReply: user ask_question reply
  // WorkReportReply: user work_report reply
  // UserLogin: user login, str param is user token, nickname is user nickname
  // AskQuestionReplyNotification: notification of an AskQuestionReply
  // WorkReportReplyNotification: notification of a WorkReportReply
  // CheckMessageValidity: check if messages are still valid
  // GetPendingMessages: get all pending messages for a user
  // RequestCancelled: notification that a request has been cancelled
  // GetOnlineUsers: get online users with the same token
  // SendChatMessage: send a chat message to another user
  // ChatMessageNotification: notification of a new chat message
  // ForwardStateQuery: query peer forward capability and windows
  // ForwardStateQueryResponse: response for ForwardStateQuery
  // ForwardStateChanged: notify peers that forward state changed
  // ForwardDeliveryError: notify sender that selected target window is invalid
  string Cmd = 1;

  // ask question
  AskQuestionRequest AskQuestionRequest = 2;

  // work report
  WorkReportRequest WorkReportRequest = 3;

  // ask question reply
  AskQuestionResponse AskQuestionResponse = 4;

  // work report reply
  WorkReportResponse WorkReportResponse = 5;

  // check message validity
  CheckMessageValidityRequest CheckMessageValidityRequest = 13;

  // check message validity response
  CheckMessageValidityResponse CheckMessageValidityResponse = 14;

  // get pending messages request
  GetPendingMessagesRequest GetPendingMessagesRequest = 15;

  // get pending messages response
  GetPendingMessagesResponse GetPendingMessagesResponse = 16;

  // request cancelled notification
  RequestCancelledNotification RequestCancelledNotification = 17;

  // get online users request
  GetOnlineUsersRequest GetOnlineUsersRequest = 19;

  // get online users response
  GetOnlineUsersResponse GetOnlineUsersResponse = 20;

  // send chat message request
  SendChatMessageRequest SendChatMessageRequest = 21;

  // chat message notification
  ChatMessageNotification ChatMessageNotification = 22;

  // user login response
  UserLoginResponse UserLoginResponse = 23;

  // user connection status notification
  UserConnectionStatusNotification UserConnectionStatusNotification = 24;

  // forward state query request
  ForwardStateQueryRequest ForwardStateQueryRequest = 25;

  // forward state query response
  ForwardStateQueryResponse ForwardStateQueryResponse = 26;

  // forward state changed notification
  ForwardStateChangedNotification ForwardStateChangedNotification = 27;

  // forward delivery error notification
  ForwardDeliveryErrorNotification ForwardDeliveryErrorNotification = 28;

  // str param
  string StrParam = 12;

  // user nickname (for UserLogin and notifications)
  string Nickname = 18;
}

service SrvAgentAssist {
  rpc AskQuestion(AskQuestionRequest) returns (AskQuestionResponse);
  rpc WorkReport(WorkReportRequest) returns (WorkReportResponse);
  rpc SendMcpClientInfo(McpClientInfoRequest) returns (McpClientInfoResponse);
}

// WebsocketMessage defines the message structure for WebSocket communication
